<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Broadcast Boletador · Bradesco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* ============ TOKENS ============ */
:root{
  --red-700:#8F0420;
  --red-600:#C90A2E;
  --red-500:#E01438;
  --red-50:#FCEAEE;
  --red-100:#F8D2D9;

  --ink-900:#14171C;
  --ink-800:#1E2229;
  --ink-700:#333944;
  --ink-500:#697180;
  --ink-400:#8A93A3;
  --ink-300:#B7BEC9;
  --ink-100:#E6E9EE;
  --ink-50:#F3F4F7;

  --surface:#F1F2F5;
  --card:#FFFFFF;
  --line:#E3E6EB;

  --teal-700:#0A5F63;
  --teal-600:#0E7B80;
  --teal-500:#12969C;
  --teal-50:#E6F5F5;

  --amber-700:#8A5A0A;
  --amber-600:#B7791F;
  --amber-50:#FCF2DF;

  --green-700:#0F6B45;
  --green-600:#1D8A5E;
  --green-50:#E5F5ED;

  --blue-700:#1B4B85;
  --blue-600:#2563AC;
  --blue-50:#E9F1FA;

  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:16px;
  --shadow-sm: 0 1px 2px rgba(20,23,28,.06);
  --shadow-md: 0 6px 20px rgba(20,23,28,.08);
  --shadow-lg: 0 20px 48px rgba(20,23,28,.18);
  --font-disp: 'Space Grotesk', 'Inter', sans-serif;
  --font-body: 'Inter', sans-serif;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0; background:var(--surface); color:var(--ink-900);
  font-family:var(--font-body); font-size:14px; line-height:1.45;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:var(--font-disp); margin:0; letter-spacing:-0.01em;}
p{margin:0;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit; font-size:13.5px;}
a{color:inherit;}
::selection{background:var(--red-100);}
.tnum{font-variant-numeric:tabular-nums;}
:focus-visible{outline:2px solid var(--teal-500); outline-offset:2px; border-radius:4px;}

/* ============ APP SHELL ============ */
#app{display:flex; flex-direction:column; height:100vh; overflow:hidden;}
#app-body{display:flex; flex:1; min-height:0;}
#app-footer{
  height:30px; flex:none; background:var(--ink-900); color:var(--ink-400); display:flex; align-items:center; justify-content:center;
  gap:8px; font-size:11px; font-weight:600; letter-spacing:.01em; border-top:1px solid rgba(255,255,255,.06);
}
#app-footer b{color:#fff; font-weight:700;}
#app-footer .fdot{width:3px;height:3px;border-radius:50%;background:var(--ink-400);}

/* ---- Sidebar ---- */
#sidebar{
  width:76px; flex:none; background:var(--ink-900); color:#fff;
  display:flex; flex-direction:column; align-items:center; padding:18px 0 14px;
  gap:4px; position:relative; z-index:20;
}
.side-mark{width:36px; height:36px; border-radius:9px; background:linear-gradient(135deg,#8a1224 0%,#c90a2e 55%,#e0163c 100%); display:flex; align-items:center; justify-content:center; margin-bottom:22px; box-shadow:0 2px 10px rgba(201,10,46,.45); flex:none; padding:7px;}
.side-mark svg{width:100%;height:100%;}
.side-nav{display:flex; flex-direction:column; gap:2px; width:100%; align-items:center; flex:1; overflow-y:auto;}
.side-item{
  width:52px; height:52px; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; color:var(--ink-400); background:transparent; border:none; position:relative; transition:background .15s, color .15s;
}
.side-item i{width:19px; height:19px;}
.side-item span{font-size:9.5px; font-weight:600; letter-spacing:.01em;}
.side-item:hover{background:rgba(255,255,255,.07); color:#fff;}
.side-item.active{background:var(--red-600); color:#fff;}
.side-item.active::before{content:''; position:absolute; left:-14px; top:50%; transform:translateY(-50%); width:4px; height:22px; background:var(--red-500); border-radius:0 4px 4px 0;}
.side-sep{width:34px; height:1px; background:rgba(255,255,255,.12); margin:8px 0;}
.side-foot{display:flex; flex-direction:column; align-items:center; gap:10px; padding-top:8px;}
.persona-chip{width:38px; height:38px; border-radius:50%; background:var(--teal-600); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; font-family:var(--font-disp);}

/* ---- Main column ---- */
#main-col{flex:1; display:flex; flex-direction:column; min-width:0;}

/* ---- Topbar ---- */
#topbar{
  height:68px; flex:none; background:var(--card); border-bottom:1px solid var(--line);
  display:flex; align-items:center; justify-content:space-between; padding:0 26px; gap:20px; z-index:15;
}
.brand-wrap{display:flex; align-items:center; gap:12px;}
.brand-mark{display:flex; align-items:center; gap:9px;}
.bradesco-logo{display:flex; align-items:center; gap:9px; background:linear-gradient(135deg,#8a1224 0%,#c90a2e 55%,#e0163c 100%); padding:7px 14px 7px 9px; border-radius:10px; box-shadow:0 3px 10px rgba(201,10,46,.35);}
.bradesco-logo .icon{width:24px;height:24px; position:relative; flex:none;}
.bradesco-logo .icon svg{width:100%;height:100%;}
.bradesco-logo .word{font-family:var(--font-disp); font-weight:700; font-size:17px; color:#ffffff; letter-spacing:-0.01em;}
.product-tag{font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:var(--ink-400); border-left:1px solid var(--line); padding-left:12px; margin-left:2px;}
.greet{display:flex; flex-direction:column; line-height:1.15; margin-left:6px;}
.greet .hi{font-size:11px; color:var(--ink-400); font-weight:600;}
.greet .name{font-size:15px; font-weight:700; font-family:var(--font-disp);}
.top-actions{display:flex; align-items:center; gap:10px;}
.entity-select{
  display:flex; align-items:center; gap:10px; background:var(--ink-50); border:1px solid var(--line); border-radius:999px;
  padding:7px 8px 7px 14px; cursor:pointer; min-width:186px; justify-content:space-between;
}
.entity-select .lbl{display:flex; flex-direction:column; line-height:1.15;}
.entity-select .lbl small{font-size:9.5px; color:var(--ink-400); font-weight:700; text-transform:uppercase; letter-spacing:.06em;}
.entity-select .lbl b{font-size:12.5px; font-weight:700;}
.entity-select select{appearance:none; border:none; background:transparent; font-weight:700; font-size:12.5px; color:var(--ink-900); cursor:pointer;}
.icon-btn{
  width:38px; height:38px; border-radius:10px; border:1px solid var(--line); background:var(--card);
  display:flex; align-items:center; justify-content:center; color:var(--ink-500); position:relative; transition:.15s;
}
.icon-btn:hover{background:var(--ink-50); color:var(--ink-900);}
.icon-btn i{width:17px;height:17px;}
.badge-dot{position:absolute; top:6px; right:6px; width:8px; height:8px; border-radius:50%; background:var(--red-600); border:2px solid var(--card);}
.btn{
  display:inline-flex; align-items:center; gap:7px; border-radius:9px; border:1px solid transparent; padding:9px 16px;
  font-weight:700; font-size:13px; transition:.15s; white-space:nowrap;
}
.btn i{width:15px;height:15px;}
.btn-primary{background:var(--red-600); color:#fff; box-shadow:0 2px 6px rgba(201,10,46,.28);}
.btn-primary:hover{background:var(--red-700);}
.btn-dark{background:var(--ink-900); color:#fff;}
.btn-dark:hover{background:var(--ink-800);}
.btn-ghost{background:var(--card); border-color:var(--line); color:var(--ink-700);}
.btn-ghost:hover{background:var(--ink-50);}
.btn-subtle{background:var(--ink-50); color:var(--ink-700); border-color:var(--ink-50);}
.btn-subtle:hover{background:var(--ink-100);}
.btn-teal{background:var(--teal-600); color:#fff;}
.btn-teal:hover{background:var(--teal-700);}
.btn-danger-outline{background:#fff; color:var(--red-600); border-color:var(--red-100);}
.btn-danger-outline:hover{background:var(--red-50);}
.btn-sm{padding:6px 11px; font-size:12px; border-radius:7px;}
.btn:disabled{opacity:.4; cursor:not-allowed;}

/* ---- Page scaffolding ---- */
#page{flex:1; overflow-y:auto; padding:26px 30px 60px;}
.page-head{display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:20px; gap:20px; flex-wrap:wrap;}
.crumb{font-size:11.5px; color:var(--ink-400); font-weight:600; display:flex; align-items:center; gap:6px; margin-bottom:6px;}
.crumb i{width:12px;height:12px;}
.page-title{font-size:24px; font-weight:700;}
.page-sub{color:var(--ink-500); font-size:13px; margin-top:4px; max-width:560px;}
.head-actions{display:flex; gap:10px; align-items:center;}

.tabs{display:flex; gap:4px; background:var(--ink-50); padding:4px; border-radius:11px; width:fit-content; margin-bottom:20px; flex-wrap:wrap;}
.tab-btn{padding:8px 16px; border-radius:8px; border:none; background:transparent; font-weight:700; font-size:12.5px; color:var(--ink-500); transition:.15s;}
.tab-btn.active{background:#fff; color:var(--ink-900); box-shadow:var(--shadow-sm);}
.tab-btn:hover:not(.active){color:var(--ink-800);}

.subtabs{display:flex; gap:18px; border-bottom:1px solid var(--line); margin-bottom:18px;}
.subtab-btn{padding:0 2px 12px; border:none; background:none; font-weight:700; font-size:13px; color:var(--ink-400); border-bottom:2px solid transparent; margin-bottom:-1px;}
.subtab-btn.active{color:var(--red-600); border-color:var(--red-600);}

/* ---- Cards / KPIs ---- */
.grid{display:grid; gap:16px;}
.kpi-row{grid-template-columns:repeat(4,1fr); margin-bottom:22px;}
.kpi-card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius-lg); padding:18px 20px; box-shadow:var(--shadow-sm); position:relative; overflow:hidden;}
.kpi-card .kpi-top{display:flex; justify-content:space-between; align-items:flex-start;}
.kpi-icon{width:34px;height:34px;border-radius:9px; display:flex; align-items:center; justify-content:center;}
.kpi-icon i{width:17px;height:17px;}
.kpi-label{font-size:11.5px; color:var(--ink-500); font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-top:14px;}
.kpi-value{font-size:27px; font-weight:700; font-family:var(--font-disp); margin-top:4px;}
.kpi-delta{font-size:11.5px; font-weight:700; margin-top:6px; display:flex; align-items:center; gap:4px;}

.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm);}
.card-pad{padding:20px 22px;}
.card-head{display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--line);}
.card-head h3{font-size:15.5px; font-weight:700;}
.card-head .hint{font-size:11.5px; color:var(--ink-400); font-weight:600; margin-top:2px;}

/* ---- Shortcuts (atalhos) ---- */
.shortcut-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px;}
.shortcut-tile{
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius-md); padding:16px 14px; text-align:left;
  display:flex; flex-direction:column; gap:14px; transition:.15s; position:relative;
}
.shortcut-tile:hover{border-color:var(--red-500); box-shadow:var(--shadow-md); transform:translateY(-1px);}
.shortcut-tile .ic{width:32px;height:32px;border-radius:8px; background:var(--red-50); color:var(--red-600); display:flex; align-items:center; justify-content:center;}
.shortcut-tile .ic i{width:16px;height:16px;}
.shortcut-tile .lbl{font-size:12.5px; font-weight:700; line-height:1.3;}

/* ---- Table ---- */
.table-wrap{overflow-x:auto;}
table.dt{width:100%; border-collapse:collapse; font-size:13px;}
table.dt thead th{
  text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-400);
  font-weight:700; padding:11px 16px; border-bottom:1px solid var(--line); white-space:nowrap; background:var(--ink-50);
  position:sticky; top:0; z-index:2;
}
table.dt thead th:first-child{border-top-left-radius:0;}
table.dt tbody td{padding:13px 16px; border-bottom:1px solid var(--line); vertical-align:middle; color:var(--ink-800);}
table.dt tbody tr:last-child td{border-bottom:none;}
table.dt tbody tr:hover{background:var(--ink-50);}
table.dt td.num, table.dt th.num{text-align:right; font-variant-numeric:tabular-nums;}
.cell-strong{font-weight:700;}
.cell-sub{font-size:11.5px; color:var(--ink-400); margin-top:2px;}
.row-actions{display:flex; gap:4px; justify-content:flex-end;}
.rowbtn{width:29px;height:29px;border-radius:7px;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;color:var(--ink-500);}
.rowbtn:hover{background:var(--ink-50); color:var(--ink-900);}
.rowbtn i{width:14px;height:14px;}
.rowbtn.danger:hover{background:var(--red-50); color:var(--red-600); border-color:var(--red-100);}
.chk{width:16px;height:16px; accent-color:var(--red-600);}

/* ---- Pills / status ---- */
.pill{display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; font-size:11px; font-weight:700; white-space:nowrap;}
.pill i{width:12px;height:12px;}
.pill-green{background:var(--green-50); color:var(--green-700);}
.pill-amber{background:var(--amber-50); color:var(--amber-700);}
.pill-red{background:var(--red-50); color:var(--red-700);}
.pill-blue{background:var(--blue-50); color:var(--blue-700);}
.pill-ink{background:var(--ink-100); color:var(--ink-700);}
.pill-teal{background:var(--teal-50); color:var(--teal-700);}
.enq-icon{width:22px;height:22px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center;}
.enq-icon i{width:13px;height:13px;}
.enq-ok{background:var(--green-50); color:var(--green-600);}
.enq-warn{background:var(--amber-50); color:var(--amber-600);}
.enq-bad{background:var(--red-50); color:var(--red-600);}

/* ---- Toolbar / search ---- */
.toolbar{display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:16px; flex-wrap:wrap;}
.search-box{display:flex; align-items:center; gap:9px; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:9px 13px; min-width:280px; flex:1; max-width:380px;}
.search-box i{width:16px;height:16px; color:var(--ink-400); flex:none;}
.search-box input{border:none; outline:none; width:100%; background:transparent; font-size:13px;}
.filter-chip{display:flex; align-items:center; gap:6px; border:1px solid var(--line); background:#fff; border-radius:8px; padding:8px 12px; font-size:12.5px; font-weight:600; color:var(--ink-600);}
.filter-chip select{border:none; background:transparent; font-weight:700; color:var(--ink-900); outline:none;}

/* ---- Forms ---- */
.form-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:18px 20px;}
.form-grid.two{grid-template-columns:repeat(2,1fr);}
.field{display:flex; flex-direction:column; gap:6px;}
.field.span2{grid-column:span 2;}
.field.span3{grid-column:span 3;}
.field label{font-size:11.5px; font-weight:700; color:var(--ink-500); text-transform:uppercase; letter-spacing:.03em;}
.field label .req{color:var(--red-600);}
.field input[type=text], .field input[type=number], .field input[type=date], .field select, .field textarea{
  border:1px solid var(--line); border-radius:9px; padding:10px 12px; font-size:13.5px; background:#fff; color:var(--ink-900); width:100%;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--teal-500);}
.field .hintline{font-size:11px; color:var(--ink-400);}
.radio-row{display:flex; gap:18px; flex-wrap:wrap; padding-top:4px;}
.radio-opt{display:flex; align-items:center; gap:7px; font-size:13px; font-weight:600; color:var(--ink-700);}
.radio-opt input{accent-color:var(--red-600); width:16px; height:16px;}
.section-label{font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:var(--red-600); display:flex; align-items:center; gap:8px; margin:6px 0 2px;}
.section-label::after{content:''; flex:1; height:1px; background:var(--line);}
fieldset{border:none; padding:0; margin:0; grid-column:1/-1; display:contents;}

/* ---- Drawer / Modal ---- */
.overlay{position:fixed; inset:0; background:rgba(15,17,21,.5); backdrop-filter:blur(2px); z-index:50; display:flex; justify-content:flex-end; opacity:0; pointer-events:none; transition:opacity .2s;}
.overlay.show{opacity:1; pointer-events:auto;}
.drawer{width:min(760px,94vw); background:var(--surface); height:100%; box-shadow:var(--shadow-lg); display:flex; flex-direction:column; transform:translateX(24px); transition:transform .22s;}
.overlay.show .drawer{transform:translateX(0);}
.drawer-head{background:var(--card); border-bottom:1px solid var(--line); padding:20px 26px; display:flex; align-items:center; justify-content:space-between;}
.drawer-head h3{font-size:17px;}
.drawer-head p{font-size:12px; color:var(--ink-400); margin-top:3px; font-weight:600;}
.drawer-body{flex:1; overflow-y:auto; padding:24px 26px;}
.drawer-foot{background:var(--card); border-top:1px solid var(--line); padding:16px 26px; display:flex; justify-content:flex-end; gap:10px;}
.close-x{width:34px;height:34px;border-radius:9px; border:1px solid var(--line); background:#fff; display:flex; align-items:center; justify-content:center; color:var(--ink-500);}
.close-x:hover{background:var(--ink-50);}

.modal-overlay{position:fixed; inset:0; background:rgba(15,17,21,.55); z-index:60; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .18s;}
.modal-overlay.show{opacity:1; pointer-events:auto;}
.modal-box{width:min(460px,92vw); background:var(--card); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); transform:scale(.96); transition:transform .18s; overflow:hidden;}
.modal-overlay.show .modal-box{transform:scale(1);}
.modal-box.wide{width:min(620px,94vw);}
.modal-head{padding:18px 22px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center;}
.modal-head h4{font-size:15px;}
.modal-body{padding:22px; max-height:70vh; overflow-y:auto;}
.modal-foot{padding:14px 22px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:10px;}

/* ---- Gauge (enquadramento signature element) ---- */
.gauge-wrap{display:flex; flex-direction:column; align-items:center; gap:6px;}
.gauge-val{font-family:var(--font-disp); font-size:22px; font-weight:700; margin-top:-46px;}
.gauge-lbl{font-size:10.5px; color:var(--ink-400); font-weight:700; text-transform:uppercase; letter-spacing:.04em;}

.limit-row{display:flex; align-items:center; gap:14px; padding:13px 0; border-bottom:1px solid var(--line);}
.limit-row:last-child{border-bottom:none;}
.limit-meta{width:190px; flex:none;}
.limit-meta .t{font-weight:700; font-size:12.5px;}
.limit-meta .s{font-size:11px; color:var(--ink-400); margin-top:1px;}
.limit-bar{flex:1; height:9px; border-radius:999px; background:var(--ink-100); position:relative; overflow:hidden;}
.limit-bar > i{position:absolute; left:0; top:0; bottom:0; border-radius:999px; display:block;}
.limit-pct{width:52px; text-align:right; font-weight:700; font-size:12.5px; flex:none;}

/* ---- Timeline (pos-trade stepper) ---- */
.stepper{display:flex; align-items:flex-start; gap:0; padding:8px 0 4px;}
.step{flex:1; display:flex; flex-direction:column; align-items:center; position:relative; text-align:center;}
.step .dot{width:30px;height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--ink-100); color:var(--ink-400); font-weight:800; font-size:12px; z-index:1; border:3px solid var(--surface-inner,#fff);}
.step.done .dot{background:var(--green-600); color:#fff;}
.step.current .dot{background:var(--teal-600); color:#fff; box-shadow:0 0 0 5px var(--teal-50);}
.step .line{position:absolute; top:15px; left:-50%; width:100%; height:2px; background:var(--ink-100); z-index:0;}
.step:first-child .line{display:none;}
.step.done .line, .step.current .line{background:var(--green-600);}
.step .lbl{font-size:11px; font-weight:700; margin-top:9px; color:var(--ink-700); max-width:100px;}
.step .time{font-size:10px; color:var(--ink-400); margin-top:2px;}

/* ---- Uploader ---- */
.uploader{border:2px dashed var(--ink-300); border-radius:var(--radius-lg); background:var(--card); padding:46px 20px; display:flex; flex-direction:column; align-items:center; gap:12px; text-align:center; transition:.15s;}
.uploader.drag{border-color:var(--teal-500); background:var(--teal-50);}
.uploader .up-ic{width:58px;height:58px; border-radius:50%; background:var(--teal-50); color:var(--teal-600); display:flex; align-items:center; justify-content:center;}
.uploader .up-ic i{width:26px;height:26px;}
.up-file{display:flex; align-items:center; justify-content:space-between; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-top:10px;}
.up-file .info{display:flex; align-items:center; gap:10px;}
.up-file .ficon{width:34px;height:34px;border-radius:8px;background:var(--green-50); color:var(--green-700); display:flex; align-items:center; justify-content:center;}

/* ---- Empty state ---- */
.empty{display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; text-align:center; color:var(--ink-400); gap:10px;}
.empty .ic{width:52px;height:52px; border-radius:50%; background:var(--ink-50); display:flex; align-items:center; justify-content:center; color:var(--ink-300);}

/* ---- Toast ---- */
#toast-wrap{position:fixed; bottom:24px; right:24px; display:flex; flex-direction:column; gap:10px; z-index:99;}
.toast{background:var(--ink-900); color:#fff; padding:13px 18px; border-radius:11px; box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:10px; font-size:13px; font-weight:600; min-width:260px; animation:toastin .25s ease;}
.toast i{width:16px;height:16px; flex:none;}
.toast.success{background:var(--green-700);}
.toast.error{background:var(--red-700);}
.toast.info{background:var(--teal-700);}
@keyframes toastin{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

/* ---- Notification panel ---- */
.notif-item{display:flex; gap:12px; padding:14px 4px; border-bottom:1px solid var(--line);}
.notif-item .dot2{width:8px;height:8px;border-radius:50%;background:var(--red-600); margin-top:6px; flex:none;}
.notif-item.read .dot2{background:var(--ink-200,#ddd);}
.notif-item b{font-size:13px;}
.notif-item .meta{font-size:11px; color:var(--ink-400); margin-top:3px;}

/* ---- misc ---- */
.divider{height:1px; background:var(--line); margin:18px 0;}
.mini-chart{display:flex; align-items:flex-end; gap:5px; height:64px;}
.mini-chart .bar{flex:1; background:linear-gradient(180deg,var(--red-500),var(--red-700)); border-radius:4px 4px 2px 2px; min-height:4px;}
.legend{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--ink-500); font-weight:600;}
.legend i.dotc{width:8px;height:8px;border-radius:2px; display:inline-block;}
.help-banner{display:flex; gap:12px; align-items:flex-start; background:var(--teal-50); border:1px solid #cdeceb; border-radius:12px; padding:14px 16px; margin-bottom:18px;}
.help-banner i{width:18px;height:18px; color:var(--teal-700); flex:none; margin-top:1px;}
.help-banner b{font-size:12.5px;}
.help-banner p{font-size:12px; color:var(--ink-600); margin-top:3px;}
.scroll-fade{-webkit-mask-image:linear-gradient(to bottom, black 92%, transparent);}
::-webkit-scrollbar{width:9px; height:9px;}
::-webkit-scrollbar-thumb{background:#c7cbd3; border-radius:20px;}
::-webkit-scrollbar-track{background:transparent;}

@media (max-width:1280px){
  .product-tag{display:none;}
  .entity-select{min-width:150px;}
}
@media (max-width:1000px){
  .form-grid{grid-template-columns:repeat(2,1fr);}
  .kpi-row{grid-template-columns:repeat(2,1fr);}
}

function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstElementChild; }

function toast(msg, type, iconName){

/* ================= PILL / ENQ HELPERS ================= */
function statusPill(status){
  const map = {
    "Pendente": ['pill-amber','clock'],
    "Pendente de Autorização Interna": ['pill-blue','shield-alert'],
    "Aprovada": ['pill-green','check'],
    "Reprovada": ['pill-red','x'],
    "Finalizada": ['pill-teal','check-check'],
    "Cancelada": ['pill-ink','slash'],
    "Ativo": ['pill-green','check'],
  };
  const [cls,ic] = map[status] || ['pill-ink','circle'];
  return `<span class="pill ${cls}">${icon(ic)}${status}</span>`;
}
function enqIcon(st){
  const map = {ok:['enq-ok','check'], warn:['enq-warn','triangle-alert'], bad:['enq-bad','x']};
  const [cls,ic] = map[st]||map.ok;
  return `<span class="enq-icon ${cls}" title="Enquadramento">${icon(ic)}</span>`;
}

/* ================= CADASTROS (Administrador) ================= */
function renderCadastros(){
  const tabs = [
    {id:'fundo', label:'Fundo', icon:'landmark'},
    {id:'ativo', label:'Ativo', icon:'boxes'},
    {id:'cotista', label:'Cotista', icon:'users'},
    {id:'gestor', label:'Gestor', icon:'briefcase'},
  ];
  qs('#page').innerHTML = `
    <div class="page-head">
      <div>
        <div class="crumb">${icon('home')} / <span>Cadastros</span></div>
        <div class="page-title">Cadastros mestres</div>
        <div class="page-sub">Manutenção de fundos, ativos, cotistas e gestores habilitados a operar na plataforma.</div>
      </div>
    </div>
    <div class="tabs" id="cad-tabs">${tabs.map(t=>`<button class="tab-btn ${state.cadastroTab===t.id?'active':''}" data-t="${t.id}">${icon(t.icon)} ${t.label}</button>`).join('')}</div>
    <div id="cad-body"></div>
  `;
  qsa('[data-t]', qs('#cad-tabs')).forEach(b=> b.addEventListener('click', ()=>{ state.cadastroTab=b.getAttribute('data-t'); renderCadastros(); }));
  const target = qs('#cad-body');
  if(state.cadastroTab==='fundo') renderListaFundos(target, {readonly:false});
  if(state.cadastroTab==='ativo') renderListaAtivos(target, {readonly:false});
  if(state.cadastroTab==='cotista') renderListaCotistas(target, {readonly:false});
  if(state.cadastroTab==='gestor') renderListaGestores(target, {readonly:false});
  refreshIcons();
}

function openFundoForm(f){

    bodyHTML: `
      <div class="tabs" id="fundo-sections" style="margin-bottom:22px;">
        ${sections.map((s,i)=>`<button class="tab-btn ${i===0?'active':''}" data-fs="${i}">${s}</button>`).join('')}
      </div>
      <div id="fundo-section-body">
        <div class="section-label">Dados cadastrais</div>
        <div class="form-grid">
          <div class="field span2"><label>Nome do fundo <span class="req">*</span></label><input type="text" id="ff-nome" value="${isEdit?f.nome:''}" placeholder="Ex: Bradesco FIC FI Renda Fixa..."></div>
          <div class="field"><label>CNPJ <span class="req">*</span></label><input type="text" id="ff-cnpj" value="${isEdit?f.cnpj:''}" placeholder="00.000.000/0001-00"></div>

            <select id="ff-tipo"><option ${isEdit&&f.tipoCota==='Abertura'?'selected':''}>Abertura</option><option ${isEdit&&f.tipoCota==='Fechado'?'selected':''}>Fechado</option></select></div>
          <div class="field"><label>Moeda <span class="req">*</span></label>
            <select id="ff-moeda"><option ${isEdit&&f.moeda==='BRL'?'selected':''}>BRL</option><option ${isEdit&&f.moeda==='USD'?'selected':''}>USD</option></select></div>
          <div class="field"><label>Perfil de risco <span class="req">*</span></label>
            <select id="ff-perfil">${['Conservador','Moderado','Agressivo'].map(p=>`<option ${isEdit&&f.perfil===p?'selected':''}>${p}</option>`).join('')}</select></div>
          <div class="field"><label>Gestor responsável <span class="req">*</span></label>
            <select id="ff-gestor">${GESTORES.map(g=>`<option ${isEdit&&f.gestor===g.nome?'selected':''}>${g.nome}</option>`).join('')}</select></div>
          <div class="field"><label>Administrador</label><input type="text" id="ff-admin" value="${isEdit?f.admin:'Bradesco'}"></div>
          <div class="field"><label>Patrimônio líquido</label><input type="text" id="ff-pl" value="${isEdit?f.pl:'R$ 0,00'}"></div>
        </div>
        <div class="section-label" style="margin-top:22px;">Benchmark &amp; enquadramento</div>
        <div class="form-grid">
          <div class="field"><label>Índice de referência</label><select><option>CDI</option><option>IPCA</option><option>Ibovespa</option><option>IMA-B</option></select></div>
          <div class="field"><label>Limite de concentração por emissor (%)</label><input type="number" value="25"></div>
          <div class="field"><label>Limite de derivativos sobre PL (%)</label><input type="number" value="30"></div>
        </div>
      </div>
    `,
    footHTML: `<button class="btn btn-ghost" onclick="closeDrawer()">Cancelar</button>
      <button class="btn btn-subtle" id="ff-save-new">Salvar e novo</button>
      <button class="btn btn-primary" id="ff-save">${icon('check')} Salvar fundo</button>`,
    onMount: ()=>{
      qsa('[data-fs]').forEach(b=> b.addEventListener('click', ()=>{
        qsa('[data-fs]').forEach(x=>x.classList.remove('active')); b.classList.add('active');
        qs('#fundo-section-body').innerHTML = `<div class="empty" style="padding:36px 10px;"><div class="ic">${icon('layout-list')}</div><p style="font-weight:700; color:var(--ink-700);">${sections[b.dataset.fs]}</p><p style="max-width:320px;">Seção complementar do cadastro — preenchida após os dados gerais serem salvos.</p></div>`;
        refreshIcons();
      }));
      const save = ()=>{
        const nome = qs('#ff-nome').value.trim();
        if(!nome){ toast('Informe o nome do fundo.', 'error','alert-triangle'); return; }
        if(isEdit){
          Object.assign(f, {nome, cnpj:qs('#ff-cnpj').value, tipoCota:qs('#ff-tipo').value, moeda:qs('#ff-moeda').value, perfil:qs('#ff-perfil').value, gestor:qs('#ff-gestor').value, admin:qs('#ff-admin').value, pl:qs('#ff-pl').value});
          toast('Fundo atualizado com sucesso.', 'success');
        } else {
          FUNDOS.unshift({id:nextId('f'), nome, cnpj:qs('#ff-cnpj').value||'00.000.000/0001-00', tipoCota:qs('#ff-tipo').value, moeda:qs('#ff-moeda').value, perfil:qs('#ff-perfil').value, gestor:qs('#ff-gestor').value, admin:qs('#ff-admin').value||'Bradesco', pl:qs('#ff-pl').value||'R$ 0,00', cotistas:0, status:'Ativo'});
          toast('Fundo cadastrado com sucesso.', 'success');
        }
        closeDrawer(); renderCadastros();
      };
      qs('#ff-save').addEventListener('click', save);
      qs('#ff-save-new').addEventListener('click', ()=>{ save(); setTimeout(()=>openFundoForm(),260); });
    }
  });
}

        if(isEdit) Object.assign(c, payload); else COTISTAS.unshift({id:nextId('c'), ...payload});
        toast(isEdit?'Cotista atualizado.':'Cotista cadastrado.', 'success');
        closeDrawer(); renderCadastros();
      });
    }
  });
}

        <div class="filter-chip">${icon('flag')}<select id="filtro-mov-status"><option>Todos os status</option>${['Pendente','Pendente de Autorização Interna','Aprovada','Reprovada','Finalizada','Cancelada'].map(s=>`<option>${s}</option>`).join('')}</select></div>

        </table>

      <tr>
        <td><input type="checkbox" class="chk row-chk" data-id="${b.id}"></td>
        <td class="cell-strong">${b.fundo}</td>
        <td>${b.ativo}<div class="cell-sub">${CLASSES[b.classe]?.grupo||''}</div></td>
        <td class="tnum">${b.data}</td>
        <td>${b.tipo}</td>
        <td class="num tnum">${fmtBRL(b.valor)}</td>
        <td class="num tnum">${b.qtd.toLocaleString('pt-BR')}</td>
        <td class="tnum">${b.registro}</td>
        <td>${statusPill(b.status)}</td>
        <td style="text-align:center;"><button class="rowbtn" data-enq="${b.id}" style="border:none;">${enqIcon(b.enqStatus)}</button></td>
        <td><div class="row-actions">
          <button class="rowbtn" data-view="${b.id}">${icon('search')}</button>
          <button class="rowbtn" data-edit="${b.id}">${icon('pencil')}</button>
          <button class="rowbtn danger" data-del="${b.id}">${icon('trash-2')}</button>
        </div></td>
      </tr>`).join('') || `<tr><td colspan="11"><div class="empty">${icon('inbox')}<p>Nenhuma boleta encontrada para o filtro atual.</p></div></td></tr>`;
    qsa('.row-chk', container).forEach(c=> c.addEventListener('change', ()=>{
      if(c.checked) state.selectedBoletas.add(c.dataset.id); else state.selectedBoletas.delete(c.dataset.id);
    }));
    qsa('[data-enq]', container).forEach(b=> b.addEventListener('click', ()=> showEnquadramentoModal(BOLETAS.find(x=>x.id===b.dataset.enq))));
    qsa('[data-view]', container).forEach(b=> b.addEventListener('click', ()=> showBoletaDetalhe(BOLETAS.find(x=>x.id===b.dataset.view))));
    qsa('[data-edit]', container).forEach(b=> b.addEventListener('click', ()=> toast('Edição de boleta disponível enquanto o status for "Pendente".', 'info','pencil')));
    qsa('[data-del]', container).forEach(b=> b.addEventListener('click', ()=>{
      confirmModal('Excluir esta boleta do registro?', ()=>{
        const idx = BOLETAS.findIndex(x=>x.id===b.dataset.del); BOLETAS.splice(idx,1); draw(filterList()); toast('Boleta excluída.', 'success','trash-2');
      });
    }));
    refreshIcons();
  };
  const filterList = ()=>{
    const v = (qs('#busca-mov').value||'').toLowerCase();
    const c = qs('#filtro-mov-classe').value;
    const s = qs('#filtro-mov-status').value;
    return BOLETAS.filter(b=>
      (b.fundo.toLowerCase().includes(v) || b.ativo.toLowerCase().includes(v)) &&
      (c==='Todas as classes' || CLASSES[b.classe]?.grupo===c) &&
      (s==='Todos os status' || b.status===s)
    );
  };
  draw(BOLETAS);
  qs('#busca-mov').addEventListener('input', ()=> draw(filterList()));
  qs('#filtro-mov-classe').addEventListener('change', ()=> draw(filterList()));
  qs('#filtro-mov-status').addEventListener('change', ()=> draw(filterList()));
  qs('#chk-all').addEventListener('change', (e)=>{
    qsa('.row-chk', container).forEach(c=>{ c.checked = e.target.checked; c.dispatchEvent(new Event('change')); });
  });
  qsa('[data-act]', container).forEach(btn=> btn.addEventListener('click', ()=>{
    if(state.selectedBoletas.size===0){ toast('Selecione ao menos uma boleta.', 'error','alert-triangle'); return; }
    const action = btn.getAttribute('data-act');
    const label = {Autorizar:'autorizadas', Aprovada:'aprovadas', Reprovada:'reprovadas', Finalizada:'liquidadas', Cancelada:'canceladas'}[action];
    BOLETAS.forEach(b=>{
      if(state.selectedBoletas.has(b.id)){
        if(action==='Autorizar') b.status = 'Pendente';
        else { b.status = action; if(action==='Finalizada'){ b.liquidacao='Liquidado'; b.custodia='Confirmada'; } }
      }
    });
    toast(`${state.selectedBoletas.size} boleta(s) ${label} com sucesso.`, 'success','check-check');
    draw(filterList());
  }));
}

      valor:d.valor, qtd:d.qtd, contraparte:d.contraparte, registro:todayStr(0),
      status: state.persona==='admin' ? 'Pendente' : 'Pendente de Autorização Interna',
      enqStatus:enqSt, enq:buildEnquadramento(seed, enqSt), liquidacao:'—', custodia:'Pendente'
    });
    return true;
  };
  qs('#bf-save').addEventListener('click', ()=>{ if(commit()){ toast('Boleta enviada para aprovação.', 'success','send-horizontal'); drawMini(); } });
  qs('#bf-save-new').addEventListener('click', ()=>{ if(commit()){ toast('Boleta salva. Formulário pronto para a próxima.', 'success'); drawMini(); qsa('#bf-form input[type=number]').forEach(i=>i.value=''); recalc(); } });
  qs('#bf-clear').addEventListener('click', ()=> renderBoletagemForm(container, classeKey));
}

/* ================= IMPORTAÇÃO EM LOTE ================= */
function renderImportacao(container){
  container.innerHTML = `
    <div class="grid" style="grid-template-columns:1.3fr 1fr; align-items:start;">
      <div class="card">
        <div class="card-head"><div><h3>Importação em lote</h3><div class="hint">/ boletagem / importacao-em-lote</div></div>
          <button class="btn btn-ghost btn-sm" id="baixar-template">${icon('download')} Download template</button>
        </div>
        <div class="card-pad">
          <div class="uploader" id="dropzone">
            <div class="up-ic">${icon('upload-cloud')}</div>
            <p style="font-weight:700;">Arraste os arquivos aqui, ou clique para selecionar</p>
            <p style="font-size:12px; color:var(--ink-400);">Suporta .csv e .xlsx conforme o template padrão de boletagem</p>
            <button class="btn btn-subtle btn-sm" id="escolher-arquivo">Escolher arquivo</button>
            <input type="file" id="file-input" style="display:none" accept=".csv,.xlsx">
          </div>
          <div id="file-preview"></div>
        </div>
        <div class="drawer-foot" style="border-radius:0 0 16px 16px;">
          <button class="btn btn-ghost" id="limpar-import">Remover arquivos</button>
          <button class="btn btn-primary" id="inserir-import" disabled>${icon('arrow-right')} Inserir</button>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><h3>Como funciona</h3></div>
        <div class="card-pad" style="display:flex; flex-direction:column; gap:16px;">
          <div class="help-banner" style="margin:0;">${icon('info')}<div><b>1. Baixe o template</b><p>Planilha padrão com as colunas exigidas por classe de ativo (RF pública/privada, RV, derivativos, cotas).</p></div></div>
          <div class="help-banner" style="margin:0;">${icon('upload-cloud')}<div><b>2. Preencha e envie</b><p>Cada linha representa uma boleta. O sistema valida automaticamente fundo, ativo e contraparte.</p></div></div>
          <div class="help-banner" style="margin:0;">${icon('shield-check')}<div><b>3. Enquadramento automático</b><p>Todas as linhas passam pela verificação de limites antes de entrarem na fila de aprovação.</p></div></div>
        </div>
      </div>
    </div>
  `;
  let fileLoaded = false;
  qs('#baixar-template').addEventListener('click', ()=> toast('Template de importação baixado.', 'success','download'));
  qs('#escolher-arquivo').addEventListener('click', ()=> qs('#file-input').click());
  const dz = qs('#dropzone');
  ['dragenter','dragover'].forEach(ev=> dz.addEventListener(ev, (e)=>{ e.preventDefault(); dz.classList.add('drag'); }));
  ['dragleave','drop'].forEach(ev=> dz.addEventListener(ev, (e)=>{ e.preventDefault(); dz.classList.remove('drag'); }));
  dz.addEventListener('drop', ()=> loadFakeFile());
  qs('#file-input').addEventListener('change', ()=> loadFakeFile());
  function loadFakeFile(){
    fileLoaded = true;
    qs('#file-preview').innerHTML = `
      <div class="up-file">
        <div class="info"><div class="ficon">${icon('file-spreadsheet')}</div>
          <div><div class="cell-strong" style="font-size:13px;">boletagem_lote_${todayStr(0).replaceAll('/','')}.xlsx</div><div class="cell-sub">48 linhas · 6 fundos · validado</div></div>
        </div>
        <button class="rowbtn danger" id="remover-file">${icon('x')}</button>
      </div>
      <div class="table-wrap" style="margin-top:14px; border:1px solid var(--line); border-radius:10px;">
        <table class="dt">
          <thead><tr><th>Fundo</th><th>Ativo</th><th>Tipo</th><th class="num">Valor</th><th>Validação</th></tr></thead>
          <tbody>
            ${FUNDOS.slice(0,5).map((f,i)=>`<tr><td class="cell-strong">${f.nome}</td><td>${ATIVOS[i+4].nome}</td><td>${i%2?'Aplicação':'Compra'}</td><td class="num tnum">${fmtBRL(500000+i*125000)}</td><td><span class="pill pill-green">${icon('check')}OK</span></td></tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    qs('#inserir-import').disabled = false;
    qs('#remover-file').addEventListener('click', clearFile);
    refreshIcons();
  }
  function clearFile(){ fileLoaded=false; qs('#file-preview').innerHTML=''; qs('#inserir-import').disabled = true; }
  qs('#limpar-import').addEventListener('click', clearFile);
  qs('#inserir-import').addEventListener('click', ()=>{
    if(!fileLoaded) return;
    FUNDOS.slice(0,5).forEach((f,i)=>{
      const seed = BOLETAS.length;
      BOLETAS.unshift({id:nextId('BOL'), fundo:f.nome, classe:'rf-privada', ativo:ATIVOS[i+4].nome, tipo:i%2?'Aplicação':'Compra',
        data:todayStr(0), valor:500000+i*125000, qtd:1000+i*50, contraparte:CONTRAPARTES[i%CONTRAPARTES.length], registro:todayStr(0),
        status:'Pendente', enqStatus:'ok', enq:buildEnquadramento(seed,'ok'), liquidacao:'—', custodia:'Pendente'});
    });
    toast('5 boletas inseridas com sucesso via importação em lote.', 'success','upload-cloud');
    clearFile();
  });
}

/* ================= ENQUADRAMENTO (painel agregado — elemento assinatura) ================= */
function svgArc(pct, size){
  size = size||128;
  const r = size/2 - 10, c = size/2;
  const circ = 2*Math.PI*r;
  const totalArc = circ*0.75;
  const dash = Math.min(pct,100)/100 * totalArc;
  const color = pct>=90 ? 'var(--red-600)' : pct>=70 ? 'var(--amber-600)' : 'var(--teal-600)';
  return `
  <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(135deg);">
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="var(--ink-100)" stroke-width="10" stroke-dasharray="${totalArc} ${circ}" stroke-linecap="round"/>
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="10" stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
  </svg>`;
}

function renderEnquadramento(){
  const fundoSel = state.enqFundo || FUNDOS[0].nome;
  const rules = [
    {label:'Concentração por emissor', sub:'Banco Bradesco S.A.', pct:68},
    {label:'Diversificação — Ações/Cotas FIA', sub:'Limite por ativo financeiro', pct:89},
    {label:'Ativos de baixa liquidez', sub:'Crédito privado', pct:34},
    {label:'Exposição a derivativos', sub:'% do PL do fundo', pct:96},
  ];
  const violacoes = BOLETAS.filter(b=> b.fundo===fundoSel && b.enqStatus!=='ok');

  qs('#page').innerHTML = `
    <div class="page-head">
      <div>
        <div class="crumb">${icon('home')} / <span>Enquadramento</span></div>
        <div class="page-title">Painel de Enquadramento</div>
        <div class="page-sub">Monitoramento em tempo real dos limites de risco e concentração por fundo.</div>
      </div>
      <div class="head-actions">
        <div class="filter-chip">${icon('landmark')}<select id="enq-fundo-select">${fundoOptions(fundoSel)}</select></div>
      </div>
    </div>

    <div class="grid" style="grid-template-columns:repeat(4,1fr); margin-bottom:20px;">
      ${rules.map(r=>`
        <div class="card card-pad" style="display:flex; flex-direction:column; align-items:center; text-align:center; gap:2px;">
          <div class="gauge-wrap">
            ${svgArc(r.pct)}
            <div class="gauge-val">${r.pct}%</div>
          </div>
          <div style="font-weight:700; font-size:12.5px; margin-top:4px;">${r.label}</div>
          <div class="gauge-lbl" style="text-transform:none; letter-spacing:0; font-weight:600;">${r.sub}</div>
        </div>`).join('')}
    </div>

    <div class="grid" style="grid-template-columns:1.3fr 1fr; align-items:start;">
      <div class="card">
        <div class="card-head"><div><h3>Limites detalhados</h3><div class="hint">${fundoSel}</div></div></div>
        <div class="card-pad">
          ${rules.map(r=>`
            <div class="limit-row">
              <div class="limit-meta"><div class="t">${r.label}</div><div class="s">${r.sub}</div></div>
              <div class="limit-bar"><i style="width:${r.pct}%; background:${r.pct>=90?'var(--red-600)':r.pct>=70?'var(--amber-600)':'var(--teal-600)'};"></i></div>
              <div class="limit-pct" style="color:${r.pct>=90?'var(--red-700)':r.pct>=70?'var(--amber-700)':'var(--teal-700)'}">${r.pct}%</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-head"><h3>Boletas com alerta / violação</h3></div>
        <div>
          ${violacoes.length ? violacoes.map(b=>`
            <div style="display:flex; justify-content:space-between; align-items:center; padding:13px 20px; border-bottom:1px solid var(--line); gap:10px; cursor:pointer;" data-enqrow="${b.id}">
              <div><div class="cell-strong" style="font-size:12.5px;">${b.ativo}</div><div class="cell-sub">${b.tipo} · ${fmtBRL(b.valor)}</div></div>
              ${enqIcon(b.enqStatus)}
            </div>`).join('') : `<div class="empty">${icon('shield-check')}<p>Nenhuma pendência de enquadramento para este fundo.</p></div>`}
        </div>
      </div>
    </div>
  `;
  qs('#enq-fundo-select').addEventListener('change', (e)=>{ state.enqFundo = e.target.value; renderEnquadramento(); });
  qsa('[data-enqrow]').forEach(r=> r.addEventListener('click', ()=> showEnquadramentoModal(BOLETAS.find(b=>b.id===r.dataset.enqrow))));
  refreshIcons();
}

/* ================= PÓS-TRADE ================= */
function renderPosTrade(){
  const elegiveis = BOLETAS.filter(b=> b.status==='Aprovada' || b.status==='Finalizada' || b.status==='Pendente de Autorização Interna' || b.status==='Pendente');
  const foco = state.postradeFoco ? BOLETAS.find(b=>b.id===state.postradeFoco) : elegiveis[0];

  const stepsFor = (b)=>{
    const order = ['Registrada','Aprovada','Liquidada','Custodiada'];
    let doneUntil = 0;
    if(b.status==='Pendente' || b.status==='Pendente de Autorização Interna') doneUntil = 0;
    if(b.status==='Aprovada') doneUntil = 1;
    if(b.status==='Finalizada') doneUntil = 3;
    if(b.status==='Reprovada' || b.status==='Cancelada') doneUntil = -1;
    return order.map((label,i)=>({label, done:i<=doneUntil, current:i===doneUntil+1 && doneUntil>=0}));
  };

  qs('#page').innerHTML = `
    <div class="page-head">
      <div>
        <div class="crumb">${icon('home')} / <span>Pós-Trade</span></div>
        <div class="page-title">Liquidação &amp; Custódia</div>
        <div class="page-sub">Acompanhe o ciclo de vida da operação após a aprovação: liquidação financeira e confirmação de custódia.</div>
      </div>
    </div>

    ${foco ? `
    <div class="card" style="margin-bottom:20px;">
      <div class="card-head"><div><h3>${foco.fundo}</h3><div class="hint">${foco.ativo} · ${foco.tipo} · ${fmtBRL(foco.valor)}</div></div>${statusPill(foco.status)}</div>
      <div class="card-pad">
        <div class="stepper">
          ${stepsFor(foco).map((s,i)=>`
            <div class="step ${s.done?'done':''} ${s.current?'current':''}">
              <div class="line"></div>
              <div class="dot">${s.done?icon('check'):(i+1)}</div>
              <div class="lbl">${s.label}</div>
              <div class="time">${s.done?todayStr(-i):'—'}</div>
            </div>`).join('')}
        </div>
        <div class="divider"></div>
        <div class="form-grid two">
          <div class="field"><label>Contraparte</label><p class="cell-strong">${foco.contraparte}</p></div>
          <div class="field"><label>Custodiante</label><p class="cell-strong">Banco Bradesco S.A. — Custódia</p></div>
          <div class="field"><label>Status de liquidação</label><p class="cell-strong">${foco.liquidacao}</p></div>
          <div class="field"><label>Status de custódia</label><p class="cell-strong">${foco.custodia}</p></div>
        </div>
      </div>
    </div>` : ''}

    <div class="card">
      <div class="card-head"><h3>Fila de liquidação</h3><div class="hint">${elegiveis.length} operações em ciclo pós-trade</div></div>
      <div class="table-wrap">
        <table class="dt">
          <thead><tr><th>Fundo</th><th>Ativo</th><th>Data operação</th><th class="num">Valor</th><th>Contraparte</th><th>Liquidação</th><th>Custódia</th><th></th></tr></thead>
          <tbody>
            ${elegiveis.map(b=>`
              <tr>
                <td class="cell-strong">${b.fundo}</td>
                <td>${b.ativo}</td>
                <td class="tnum">${b.data}</td>
                <td class="num tnum">${fmtBRL(b.valor)}</td>
                <td>${b.contraparte}</td>
                <td><span class="pill ${b.liquidacao==='Liquidado'?'pill-green':'pill-amber'}">${icon(b.liquidacao==='Liquidado'?'check':'clock')}${b.liquidacao}</span></td>
                <td><span class="pill ${b.custodia==='Confirmada'?'pill-green':'pill-ink'}">${icon(b.custodia==='Confirmada'?'check':'hourglass')}${b.custodia}</span></td>
                <td><button class="rowbtn" data-foco="${b.id}">${icon('route')}</button></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
  qsa('[data-foco]').forEach(b=> b.addEventListener('click', ()=>{ state.postradeFoco=b.dataset.foco; renderPosTrade(); qs('#page').scrollTop=0; }));
  refreshIcons();
}

/* ================= CONFIGURAÇÕES ================= */

/* ================= ROUTER / INIT ================= */
function render(){
  renderSidebar();
  renderTopbar();
  const routes = {
    'inicio': renderInicio,
    'consultas': renderConsultas,
    'cadastros': ()=> state.persona==='admin' ? renderCadastros() : renderConsultas(),
    'boletagem': renderBoletagem,
    'pos-trade': renderPosTrade,
    'enquadramento': renderEnquadramento,
    'configuracoes': renderConfiguracoes,
  };
  (routes[state.route]||renderInicio)();
  refreshIcons();
}

document.addEventListener('DOMContentLoaded', render);
</script>
